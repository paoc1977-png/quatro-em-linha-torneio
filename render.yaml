services:
  - type: web
    name: quatro-em-linha-torneio
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: ADMIN_PIN
        sync: false
      - key: DATA_DIR
        value: /tmp/quatro-em-linha
