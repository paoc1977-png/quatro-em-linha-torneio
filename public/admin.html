<!doctype html><html lang="pt-PT"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Professor · 4 em Linha</title><link rel="stylesheet" href="/styles.css"></head><body><header><div class="brand"><i></i><i></i><i></i><i></i></div><div><h1>Painel do professor</h1><p>Torneio 4 em Linha</p></div><div class="header-actions"><a class="button" href="/projector.html">Projeção</a><a class="button" href="/">Jogadores</a></div></header><main><div class="grid"><section class="card"><p class="eyebrow">Configuração do torneio</p><label>PIN do professor<input id="pin" type="password" inputmode="numeric"></label><label>Título<input id="title" value="Torneio 4 em Linha"></label><h2>Variante</h2><div class="choice-grid"><button class="choice selected" data-variant="classic"><strong>4 em Linha Clássico</strong><small>Tabuleiro 7 × 6</small></button><button class="choice" data-variant="spatial"><strong>4 em Linha Espacial</strong><small>Tabuleiro 4 × 4 × 4 rotativo</small></button></div><h2>Dispositivos</h2><div class="choice-grid"><button class="choice selected" data-mode="individual"><strong>Um por jogador</strong><small>Cada aluno no seu equipamento</small></button><button class="choice" data-mode="shared"><strong>Um por partida</strong><small>Dois alunos partilham o ecrã</small></button></div><label>Número de rondas<input id="rounds" type="number" min="1" max="15" value="5"></label><div class="actions"><button id="save" class="primary">Guardar configuração</button><button id="start" class="primary">Iniciar torneio</button><button id="next">Ronda seguinte</button></div><button id="new" class="danger">Criar torneio novo</button><p id="notice" class="notice"></p><p id="error" class="error"></p></section><section class="card room"><p class="eyebrow">Acesso dos jogadores</p><button id="toggleAccess">Mostrar acesso dos jogadores</button><div id="access" class="hidden"><div id="room" class="room-code">------</div><img id="qr" alt="QR code"><p class="url" id="url"></p></div><p id="status" class="notice"></p></section></div><div class="dashboard" style="margin-top:20px"><section class="card"><h2>Participantes</h2><div class="actions"><input id="playerName" placeholder="Nome do aluno"><button id="add">Adicionar</button></div><div id="players" class="list"></div></section><section class="card"><h2 id="roundTitle">Classificação</h2><div id="matches" class="list"></div><div id="standings"></div></section></div></main><script src="/common.js"></script><script src="/admin.js"></script></body></html>
